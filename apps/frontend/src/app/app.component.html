<mat-sidenav-container>
  <mat-sidenav mode="side" [opened]="true">
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav mode="over" position="end" [opened]="drawerOpen" (closed)="onDrawerClosed()">
    @if (drawerComponent === 'produto-form' || drawerComponent.startsWith('produto-edit-')) {
      <app-produto-form />
    }
    @if (drawerComponent === 'nota-form') {
      <app-nota-form />
    }
    @if (drawerComponent.startsWith('nota-detail-')) {
      <app-nota-detail />
    }
  </mat-sidenav>

  <mat-sidenav-content class="main-area">
    <app-top-bar [title]="pageTitle" />
    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

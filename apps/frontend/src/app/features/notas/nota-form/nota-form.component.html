<div class="drawer-header">
  <span class="drawer-title">Nova Nota Fiscal</span>
  <button mat-icon-button (click)="fechar()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="drawer-body">
  <!-- Add Item Form -->
  <div class="add-item-form" [formGroup]="form">
    <mat-form-field appearance="outline" class="field-produto">
      <mat-label>Produto</mat-label>
      <mat-select formControlName="produto" [compareWith]="compareProdutos">
        @for (p of produtos; track p.id) {
          <mat-option [value]="p">
            {{ p.codigo }} - {{ p.descricao }} (Saldo: {{ p.saldo }})
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="field-quantidade">
      <mat-label>Qtd</mat-label>
      <input matInput type="number" formControlName="quantidade" />
    </mat-form-field>

    <button class="btn-add" (click)="adicionarItem()" [disabled]="form.invalid">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <!-- Items Table -->
  @if (itens.length > 0) {
    <app-nota-items-table
      [itens]="itensParaTabela"
      [produtoMap]="produtoMap"
    />
  }
</div>

<div class="drawer-footer">
  <button mat-stroked-button (click)="fechar()">Cancelar</button>
  <button mat-flat-button (click)="salvar()" [disabled]="itens.length === 0">
    Salvar
  </button>
</div>

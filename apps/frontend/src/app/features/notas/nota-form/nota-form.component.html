<div class="drawer-header">
  <span class="drawer-title">Nova Nota Fiscal</span>
  <button mat-icon-button (click)="fechar()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="drawer-body">
  <app-nota-item-adder [produtos]="produtos" (itemAdded)="onItemAdicionado($event)" />

  @if (itens.length > 0) {
    <app-nota-items-table
      [itens]="itensParaTabela"
      [produtoMap]="produtoMap"
    />
  }
</div>

<div class="drawer-footer">
  <button mat-stroked-button (click)="fechar()">Cancelar</button>
  <button mat-flat-button (click)="salvar()" [disabled]="itens.length === 0">
    Salvar
  </button>
</div>

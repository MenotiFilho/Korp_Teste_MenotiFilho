@if (nota) {
  <div class="panel-header">
    <span class="panel-title">Nota Fiscal #{{ formatarNumero(nota.numero) }}</span>
    <button mat-icon-button (click)="fechar()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="panel-body">
    <div class="info-row">
      <span class="info-label">Número</span>
      <span class="info-value mono">#{{ formatarNumero(nota.numero) }}</span>
    </div>

    <div class="info-row">
      <span class="info-label">Status</span>
      <app-status-badge [status]="nota.status" />
    </div>

    <div class="info-row">
      <span class="info-label">Criado em</span>
      <span class="info-value">{{ formatarData(nota.criado_em) }}</span>
    </div>

    <div class="divider"></div>

    <span class="section-title">Itens da Nota</span>

    <app-nota-items-table
      [itens]="nota.itens"
      [produtoMap]="produtoMap"
    />
  </div>

  <div class="panel-footer">
    <button mat-stroked-button (click)="fechar()">Fechar</button>
    <button mat-flat-button class="btn-print" (click)="imprimir()"
            [disabled]="nota.status !== 'ABERTA'">
      <mat-icon>print</mat-icon>
      Imprimir Nota
    </button>
  </div>
} @else if (erroCarregamento) {
  <div class="panel-header">
    <span class="panel-title">Nota Fiscal</span>
    <button mat-icon-button (click)="fechar()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <div class="panel-body">
    <div class="panel-error">{{ erroCarregamento }}</div>
  </div>
}

<app-loading-overlay [visible]="loading" message="Processando impressão..." />
